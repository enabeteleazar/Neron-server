# =============================================================================
# neron.yaml — Configuration centralisée Néron AI v2.1.0
# =============================================================================
# Ce fichier remplace les variables .env éparpillées.
# Modifiez les valeurs ici, puis relancez avec : neron restart
# =============================================================================

# -----------------------------------------------------------------------------
# Général
# -----------------------------------------------------------------------------
neron:
  version: "2.1.0"
  log_level: INFO        # DEBUG | INFO | WARNING | ERROR
  api_key: "changez_moi" # Header X-API-Key requis sur /input/*

# -----------------------------------------------------------------------------
# Serveur API
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8000

# -----------------------------------------------------------------------------
# LLM — Modèle de langage via Ollama
# -----------------------------------------------------------------------------
llm:
  model: "llama3.2:1b"              # Modèle Ollama à utiliser
  host: "http://localhost:11434"    # URL du service Ollama
  timeout: 120                      # Timeout en secondes
  temperature: 0.7
  max_tokens: 2048

# -----------------------------------------------------------------------------
# STT — Reconnaissance vocale (faster-whisper)
# -----------------------------------------------------------------------------
stt:
  model: "base"     # tiny | base | small | medium | large
  language: "fr"    # Code langue ISO 639-1
  timeout: 60       # Timeout transcription en secondes
  max_size_mb: 10   # Taille max fichier audio accepté

# -----------------------------------------------------------------------------
# TTS — Synthèse vocale (pyttsx3)
# -----------------------------------------------------------------------------
tts:
  engine: "pyttsx3"  # pyttsx3 (offline) | gtts (online, optionnel)
  language: "fr"
  rate: 150          # Vitesse de parole (mots/min)
  max_chars: 1000    # Longueur max du texte à synthétiser

# -----------------------------------------------------------------------------
# Telegram — Bots bidirectionnels (optionnel)
# -----------------------------------------------------------------------------
telegram:
  enabled: false
  bot_token: ""      # Token BotFather — laisser vide pour désactiver
  chat_id: ""        # Chat ID autorisé (whitelist)
  notify_on_start: true   # Envoyer un message au démarrage

# -----------------------------------------------------------------------------
# Watchdog — Supervision et restart automatique (optionnel)
# -----------------------------------------------------------------------------
watchdog:
  enabled: false
  check_interval: 30      # Intervalle de vérification en secondes
  restart_max_retries: 3  # Tentatives avant alerte
  alert_telegram: true    # Envoyer alerte Telegram si watchdog activé

# -----------------------------------------------------------------------------
# Mémoire — Historique des conversations
# -----------------------------------------------------------------------------
memory:
  db_path: "data/memory.db"   # Chemin relatif depuis NERON_DIR
  retention_days: 30           # Rétention des entrées en jours

# -----------------------------------------------------------------------------
# Logs
# -----------------------------------------------------------------------------
logs:
  dir: "logs"              # Dossier de logs (relatif depuis NERON_DIR)
  neron_log: "neron.log"
  watchdog_log: "watchdog.log"
  max_size_mb: 10          # Rotation au-delà de cette taille
  backup_count: 5          # Nombre de fichiers de rotation conservés
