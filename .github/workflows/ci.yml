name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libyaml-dev python3-dev
      - name: Create venv
        run: python -m venv .venv && . .venv/bin/activate && pip install --upgrade pip
      - name: Install test requirements (with constraints)
        run: . .venv/bin/activate && pip install -r server/requirements-test.txt --constraint constraints.txt --prefer-binary
      - name: Run tests
        run: . .venv/bin/activate && PYTHONPATH=llm .venv/bin/pytest -q --disable-warnings
