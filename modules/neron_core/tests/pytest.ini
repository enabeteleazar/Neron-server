[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --color=yes
    -p no:warnings

markers =
    unit: Tests unitaires purs (sans services externes)
    integration: Tests necessitant les services Docker

[coverage:run]
source = .
omit =
    tests/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
