# modules/neron_llm/pytest.ini

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers personnalisés
markers =
    unit: Tests unitaires (mocks)
    integration: Tests d'intégration (nécessitent Ollama)
    slow: Tests lents

# Configuration asyncio
asyncio_mode = auto

# Patterns à ignorer
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__

# Configuration de coverage
[coverage:run]
source = .
omit = 
    tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
