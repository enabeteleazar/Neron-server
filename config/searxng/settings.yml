# config/searxng/settings.yml
# Configuration minimale SearXNG pour Néron

use_default_settings: true

general:
  debug: false
  instance_name: "Néron Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "fr"
  formats:
    - html
    - json        # ⚠️ REQUIS pour que web_agent puisse l'interroger

server:
  secret_key: "neron_searxng_secret_change_me"
  limiter: false  # désactivé car usage interne uniquement
  image_proxy: false

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
    language: fr

ui:
  static_use_hash: true
  default_theme: simple
