services:
 
  neron-core:
    build: ../backend/core
    container_name: neron-core
    ports:
      - "${NERON_CORE_HTTP:-8000}:8000"
#    depends_on:
#      neron-ollama:
#        condition: service_healthy
#      neron-stt:
#        condition: service_healthy
#      neron-memory:
#        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - Neron_Network

  neron-ollama:
    image: ollama/ollama:latest
    container_name: neron-ollama
    restart: unless-stopped
    ports:
      - "${NERON_ollama_HTTP:-11434}:11434"
    volumes:
      - ${DOCKER_DATA_PATH:-/opt/Homebox_AI/Data}/ollama:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
#      test: ["CMD-SHELL", "exit 0"]
      test: ["CMD", "curl", "-f", "http://127.0.0.1:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - Neron_Network
 #    Décommenter pour GPU (NVIDIA)
 #    deploy:
 #      resources:
 #        reservations:
 #          devices:
 #            - driver: nvidi
 #              count: 1
 #              capabilities: [gpu]

  # ====================================



  neron-stt:
    build: ./neron-stt
    container_name: neron-stt

    ports:
      - "${NERON_STT_HTTP:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - Neron_Network

  neron-memory:
    build: ./neron-memory
    container_name: neron-memory
    volumes:
      - ${DOCKER_DATA_PATH:-/opt/Homebox_AI/Data}/neron-memory-data:/data
    ports:
      - "${NERON_MEMORY_HTTP:-8002}:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - Neron_Network

  neron-web:
    build: ./neron-web
    container_name: neron-web
    ports:
      - "7860:7860"
    depends_on:
      - neron-core
      - neron-memory
    networks:
      - Neron_Network
    restart: unless-stopped

  neron-telegram:
    build: ./neron-telegram
    container_name: neron-telegram
    depends_on:
      - neron-core
      - neron-memory
    networks:
      - Neron_Network
    restart: unless-stopped

  neron-searxng:
    image: searxng/searxng:latest
    container_name: neron-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./neron_search/searxng:/etc/searxg:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    networks:
      - Neron_Network
    restart: unless-stopped

networks:
  Neron_Network:
    external: true

volumes:
  ollama:
  memory:
  neron-memory-data:
