#      interval: 30s
#      timeout: 10s
#      retries: 3
#      start_period: 40s
#    restart: unless-stopped
#    networks:
#      - Neron_Network

  neron_web:
    build: ./modules/neron_web
    container_name: neron_web
    ports:
      - "7860:7860"
    environment:
    - NERON_CORE_URL=http://192.168.1.130:8000
    depends_on:
      - neron_core
      - neron_memory
    networks:
      - Neron_Network
    restart: unless-stopped

