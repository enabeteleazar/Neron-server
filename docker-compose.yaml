services:

  neron_core:
    build: ./modules/neron_core
    env_file:
      - /opt/Neron_AI/.env
    container_name: neron_core
    ports:
      - "${NERON_CORE_HTTP:-8000}:8000"
    depends_on:
      neron_llm:
        condition: service_healthy
#      neron_stt:
#        condition: service_healthy
      neron_memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - Neron_Network

  neron_ollama:
    image: ollama/ollama:latest
    container_name: neron_ollama
    restart: unless-stopped
    ports:
      - "${NERON_LLM_HTTP:-11434}:11434"
    volumes:
      - ${DOCKER_DATA_PATH:-./data}/ollama:/root/.ollama
    networks:
      - Neron_Network
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
#     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  neron_llm:
    build: ./modules/neron_llm
    container_name: neron_llm
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ENV=development
      - LOG_LEVEL=DEBUG
      - OLLAMA_HOST=http://neron_ollama:11434
      - DEFAULT_MODEL=llama3.2:1b
    depends_on:
      neron_ollama:
        condition: service_healthy
    networks:
      - Neron_Network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neron_memory:
    build: ./modules/neron_memory
    env_file:
      - /opt/Neron_AI/.env
    container_name: neron_memory
    volumes:
      - ${DOCKER_DATA_PATH:-/opt/Homebox_AI/Data}/neron-memory-data:/data
    ports:
      - "${NERON_MEMORY_HTTP:-8002}:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - Neron_Network

#  neron_stt:
#    build: ./modules/neron_stt
#    env_file:
#      - /opt/Neron_AI/.env
