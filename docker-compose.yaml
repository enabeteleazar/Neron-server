

services:

  neron_watchdog:
    build: ./modules/neron_watchdog
    container_name: neron_watchdog
    ports:
      - "8003:8003"
    volumes:
      - ./modules/neron_watchdog/app.py:/app/app.py
      - ${DOCKER_DATA_PATH:-./data}/watchdog:/app/data
      - neron_watchdog-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/Data:/mnt/Data:ro
      - /mnt/usb-storage:/mnt/usb-storage:ro
    env_file:
      - /opt/Neron_AI/.env
    environment:
      - CHECK_INTERVAL=60
      - CHECK_TIMEOUT=10
      - MAX_RESPONSE_TIME=5.0
    group_add:
      - "988"
    restart: unless-stopped
    networks:
      - Neron_Network
      - neron_internal

  neron_core:
    build: ./modules/neron_core
    env_file:
      - /opt/Neron_AI/.env
    environment:
      - NERON_LLM_URL=http://neron_llm:5000
    container_name: neron_core
    volumes:
      - ./modules/neron_core/app.py:/app/app.py
    ports:
      - "${NERON_CORE_HTTP:-8000}:8000"
    depends_on:
      neron_llm:
        condition: service_healthy
      neron_memory:
        condition: service_healthy
      neron_searxng:
        condition: service_healthy
      neron_stt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - Neron_Network
      - Homebox_Network
      - neron_internal

  neron_ollama:
    image: ollama/ollama:latest
    container_name: neron_ollama
    restart: unless-stopped
    volumes:
      - ${DOCKER_DATA_PATH:-./data}/ollama:/root/.ollama
    expose:
      - "11434"
    networks:
      - neron_internal
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  neron_llm:
    build: ./modules/neron_llm
    container_name: neron_llm
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      - OLLAMA_HOST=http://neron_ollama:11434
      - DEFAULT_MODEL=llama3.2:3b
    depends_on:
      neron_ollama:
        condition: service_healthy
    networks:
      - neron_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  neron_stt:
    build: ./modules/neron_stt
    env_file:
      - /opt/Neron_AI/.env
    container_name: neron_stt
    ports:
      - "${NERON_STT_HTTP:-8001}:8001"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - neron_internal
      - Neron_Network

  neron_searxng:
    image: searxng/searxng:latest
    container_name: neron_searxng
    restart: unless-stopped
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://neron_searxng:8080
    expose:
      - "8080"
    networks:
      - neron_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  neron_memory:
    build: ./modules/neron_memory
    env_file:
      - /opt/Neron_AI/.env
    container_name: neron_memory
    volumes:
      - ${DOCKER_DATA_PATH:-./data}/memory:/data
    expose:
      - "8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - neron_internal


  neron_tts:
    build: ./modules/neron_tts
    container_name: neron_tts
    expose:
      - "8003"
    environment:
      - TTS_ENGINE=pyttsx3
      - TTS_LANGUAGE=fr
      - TTS_RATE=150
      - TTS_VOLUME=1.0
      - TTS_MAX_CHARS=1000
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - neron_internal

  neron_web_voice:
    build: ./modules/neron_web_voice
    container_name: neron_web_voice
    env_file:
      - /opt/Neron_AI/.env
    volumes:
      - /mnt/usb-storage/Neron_AI/modules/neron_web_voice/cert.pem:/app/cert.pem:ro
      - /mnt/usb-storage/Neron_AI/modules/neron_web_voice/key.pem:/app/key.pem:ro
    ports:
      - "${NERON_WEB_VOICE:-8080}:8080"
    environment:
      - NERON_CORE_URL=http://neron_core:8000
      - NERON_STT_URL=http://neron_stt:8001
    depends_on:
      neron_core:
        condition: service_healthy
      neron_stt:
        condition: service_healthy
    networks:
      - Neron_Network
      - neron_internal
    restart: unless-stopped

  neron_telegram:
    build: ./modules/neron_telegram
    container_name: neron_telegram
    volumes:
      - ./modules/neron_telegram/app.py:/app/app.py
    env_file:
      - /opt/Neron_AI/.env
    ports:
      - "8010:8010"
    depends_on:
      neron_core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - Neron_Network

  neron_hud:
    build: ./modules/neron_hud
    container_name: neron_hud
    ports:
      - "8085:8080"
    environment:
      - NERON_CORE_URL=http://neron_core:8000
      - NERON_STT_URL=http://neron_stt:8001
      - NERON_WATCHDOG_URL=http://neron_watchdog:8003
    depends_on:
      - neron_core
      - neron_watchdog
    networks:
      - Neron_Network
    restart: unless-stopped

networks:
  Neron_Network:
    external: true
  Homebox_Network:
    external: true
  neron_internal:
    driver: bridge
    internal: true

volumes:
  ollama:
  memory:
  neron_memory-data:
  neron_watchdog-logs:
