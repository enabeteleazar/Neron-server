[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neron-llm"
version = "0.1.0"
description = "neron llm package (internal)"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = [""]
include = ["neron_llm"]
